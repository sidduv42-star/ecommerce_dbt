version: 2

models:
  - name: dim_customer
    description: "Customer dimension with segments and RFM attributes"
    columns:
      - name: customer_key
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - not_null
      - name: customer_segment
        tests:
          - not_null
          - accepted_values:
              values: ['New', 'Growing', 'Established']

  - name: dim_location
    description: "Location dimension with zone and capacity"
    columns:
      - name: location_key
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: city
        tests:
          - not_null
      - name: zone
        tests:
          - not_null

  - name: fact_orders
    description: "Order fact table — grain: one row per order"
    columns:
      - name: order_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: customer_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key
      - name: location_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_location')
              field: location_key
      - name: total_amount
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ['Delivered', 'Shipped', 'Pending', 'Cancelled', 'Returned', 'Confirmed']